name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- macOS ----
          - os: macos-15
            target: aarch64-apple-darwin
            suffix: macos-arm64
            bundle: dmg
            label: macOS ARM64
          - os: macos-15
            target: x86_64-apple-darwin
            suffix: macos-x64
            bundle: dmg
            label: macOS Intel

          # ---- Windows ----
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: windows-arm64
            bundle: msi
            label: Windows ARM64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
            bundle: msi
            label: Windows x64

          # ---- Linux ----
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            bundle: deb
            label: Linux ARM64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            bundle: deb
            label: Linux x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      # --- macOS ---
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install jq

      # --- Linux (x64) ---
      - name: Install Linux x64 deps
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # --- Linux (ARM64) ---
      - name: Install Linux ARM64 deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # --- Build ---
      - name: Build Tauri app (${{ matrix.label }})
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # --- Upload only the installer file ---
      - name: Find installer file
        id: find
        shell: bash
        run: |
          dir="src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle }}/"
          file=$(ls "$dir" | grep -i -E "\.(dmg|msi|deb)$" | head -1)
          echo "file=$dir$file" >> "$GITHUB_OUTPUT"
          echo "Found: $dir$file"

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-manager-${{ matrix.suffix }}
          path: ${{ steps.find.outputs.file }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          echo "## OpenWrt Manager ${{ github.ref_name }}" > notes.md
          echo "" >> notes.md
          echo "| Platform | Download |" >> notes.md
          echo "|----------|----------|" >> notes.md
          for f in artifacts/*/openwrt-manager-*; do
            name=$(basename "$f")
            echo "| $name | [Download](https://github.com/ismkdc/openwrt-manager/releases/download/${{ github.ref_name }}/$name) |" >> notes.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: notes.md
          files: artifacts/**/*
          generate_release_notes: false
