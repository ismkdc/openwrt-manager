name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (M1/M2/M3) - native
          - os: macos-15
            target: aarch64-apple-darwin
            suffix: macos-arm64
            bundle: dmg
          # macOS Intel - native
          - os: macos-15
            target: x86_64-apple-darwin
            suffix: macos-x64
            bundle: dmg

          # Windows ARM64 - native (cross-compile x64 from ARM runner)
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: windows-arm64
            bundle: msi
          # Windows x64 - cross-compile from ARM runner (faster than x86 emulation)
          - os: windows-11-arm
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
            bundle: msi

          # Linux x64 - native
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            bundle: deb
          # Linux ARM64 - native on ARM runner
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            bundle: deb
          # Linux ARMhf - SKIPPED: cross-compiling GTK/WebKit is not feasible on CI
          # Build natively on the target device instead.

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      # --- macOS ---
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install jq

      # --- Linux ---
      - name: Install Linux deps (x64)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Linux deps (ARM64 - native on ARM runner)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            gcc-aarch64-linux-gnu



      # --- Windows ---
      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # WebView2 is preinstalled on Windows runners
          echo "WebView2 available"



      # --- Build ---
      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # --- Upload ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-manager-${{ matrix.suffix }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle }}/
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          echo "## OpenWrt Manager ${{ github.ref_name }}" > notes.md
          echo "" >> notes.md
          echo "### Downloads" >> notes.md
          find artifacts -type f | sort >> notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: notes.md
          files: artifacts/**/*
          generate_release_notes: false
